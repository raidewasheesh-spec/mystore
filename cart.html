<!DOCTYPE html>
<html>
<head>
<title>MyStore - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #ff3f6c;
    color: white;
}

img {
    width: 60px;
    height: 60px;
    object-fit: cover;
}

button {
    padding: 6px 10px;
    border: none;
    background: #ff3f6c;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}

button:hover {
    opacity: 0.8;
}

.total-section {
    margin-top: 20px;
    font-size: 18px;
    text-align: right;
}

.coupon-section {
    margin-top: 20px;
}

input {
    padding: 6px;
    width: 150px;
}

select {
    padding: 6px;
    margin-top: 10px;
}

@media (max-width: 600px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }
    td {
        border: none;
        margin-bottom: 10px;
    }
}
</style>
</head>

<body>

<h2>Your Shopping Cart</h2>

<table>
<thead>
<tr>
<th>Image</th>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="cartItems"></tbody>
</table>

<div class="total-section">
<strong>Grand Total: ₹ <span id="grandTotal">0</span></strong>
</div>

<div class="coupon-section">
<h3>Apply Coupon</h3>
<input type="text" id="couponCode" placeholder="Enter code">
<button onclick="applyCoupon()">Apply</button>
</div>

<h3>Payment Method</h3>
<select>
<option>Credit/Debit Card</option>
<option>UPI</option>
<option>Net Banking</option>
<option>Cash on Delivery</option>
</select>

<br><br>
<button onclick="checkout()">Proceed to Payment</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let grandTotal = 0;
let discount = 0;

function loadCart() {
    const cartTable = document.getElementById("cartItems");
    cartTable.innerHTML = "";
    grandTotal = 0;

    cart.forEach((item, index) => {
        let itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        cartTable.innerHTML += `
        <tr>
            <td><img src="${item.image}"></td>
            <td>${item.name}</td>
            <td>₹${item.price}</td>
            <td>
                <button onclick="changeQty(${index}, -1)">-</button>
                ${item.quantity}
                <button onclick="changeQty(${index}, 1)">+</button>
            </td>
            <td>₹${itemTotal}</td>
            <td>
                <button onclick="removeItem(${index})">Remove</button>
            </td>
        </tr>`;
    });

    document.getElementById("grandTotal").innerText = grandTotal - discount;
}

function changeQty(index, change) {
    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function applyCoupon() {
    const code = document.getElementById("couponCode").value;

    if (code === "SAVE10") {
        discount = Math.floor(grandTotal * 0.10);
        alert("Coupon Applied! 10% Discount");
    } else {
        discount = 0;
        alert("Invalid Coupon");
    }

    loadCart();
}

function checkout() {
    alert("Payment Successful! Thank you for shopping.");
    localStorage.removeItem("cart");
    location.reload();
}

loadCart();
</script>

</body>
</html>
