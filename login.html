<!DOCTYPE html>
<html>
<head>
<title>Login - MyStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #ff3f6c, #ff9a9e);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
<div class="floating-nav">
    <button onclick="history.back()">⬅ Back</button>
    <button onclick="window.location.href='index.html'">🏠 Home</button>
</div>
.login-box {
    background: white;
    padding: 40px;
    width: 320px;
    border-radius: 10px;
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff3f6c;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.8;
}

.extra {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Welcome Back</h2>

<input type="text" placeholder="Email or Mobile">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="extra">
<p>New User? Sign Up</p>
<p>Secure Login | Fast Checkout</p>
</div>
</div>

<script>
function login(){
    alert("Login Successful (Demo Mode)");
    window.location.href="index.html";
}
</script>

</body>
</html>
