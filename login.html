<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
.box { padding:20px; border:1px solid #ccc; border-radius:10px; width:250px; }
input { width:100%; padding:8px; margin:10px 0; }
button { width:100%; padding:8px; background:#d63384; color:white; border:none; }
</style>
</head>

<body>
<div class="box">
<h3>Login</h3>
<input type="text" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="alert('Login Successful')">Login</button>
</div>
</body>
</html>
