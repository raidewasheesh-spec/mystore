<!DOCTYPE html>
<html>
<head>
<title>MyStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Header */
header {
    background: #ff3f6c;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: bold;
}

/* Carousel */
.carousel {
    position: relative;
    width: 100%;
    height: 300px;
    overflow: hidden;
}

.slides {
    display: flex;
    width: 300%;
    animation: slide 9s infinite;
}

.slide {
    width: 100%;
    flex-shrink: 0;
}

.slide img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

@keyframes slide {
    0% { transform: translateX(0%); }
    33% { transform: translateX(-100%); }
    66% { transform: translateX(-200%); }
    100% { transform: translateX(0%); }
}

/* Products */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.product {
    background: white;
    width: 220px;
    margin: 15px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.price {
    color: #ff3f6c;
    font-weight: bold;
}

button {
    background: #ff3f6c;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.8;
}

@media(max-width:600px){
    .products{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<header>
<div><strong>MyStore</strong></div>
<div>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
<a href="cart.html">Cart</a>
</div>
</header>

<!-- Carousel -->
<div class="carousel">
    <div class="slides">
        <div class="slide">
            <img src="banner1.jpg">
        </div>
        <div class="slide">
            <img src="banner2.jpg">
        </div>
        <div class="slide">
            <img src="banner3.jpg">
        </div>
    </div>
</div>

<h2 style="text-align:center;">Trending Products</h2>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>Casual T-Shirt</h3>
<p class="price">₹299</p>
<button onclick="addToCart('Casual T-Shirt', 299, 'tshirt.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="kurti.jpg">
<h3>Stylish Kurti</h3>
<p class="price">₹499</p>
<button onclick="addToCart('Stylish Kurti', 499, 'kurti.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="shoes.jpg">
<h3>Sports Shoes</h3>
<p class="price">₹999</p>
<button onclick="addToCart('Sports Shoes', 999, 'shoes.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="watch.jpg">
<h3>Classic Watch</h3>
<p class="price">₹799</p>
<button onclick="addToCart('Classic Watch', 799, 'watch.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="bag.jpg">
<h3>Handbag</h3>
<p class="price">₹599</p>
<button onclick="addToCart('Handbag', 599, 'bag.jpg')">Add to Cart</button>
</div>

</div>

<script>
function addToCart(name, price, image) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existingProduct = cart.find(item => item.name === name);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({
            name: name,
            price: price,
            image: image,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart!");
}
</script>

</body>
</html>
