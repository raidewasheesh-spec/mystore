<!DOCTYPE html>
<html>
<head>
<title>MyStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

header {
    background: #ff3f6c;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

header a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: bold;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.product {
    background: white;
    width: 220px;
    margin: 15px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.price {
    color: #ff3f6c;
    font-weight: bold;
}

button {
    background: #ff3f6c;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
<div><strong>MyStore</strong></div>
<div>
<a href="index.html">Home</a>
<a href="cart.html">Cart</a>
</div>
</header>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>Casual T-Shirt</h3>
<p class="price">₹299</p>
<button onclick="addToCart('Casual T-Shirt', 299, 'tshirt.jpg')">
Add to Cart
</button>
</div>

<div class="product">
<img src="kurti.jpg">
<h3>Stylish Kurti</h3>
<p class="price">₹499</p>
<button onclick="addToCart('Stylish Kurti', 499, 'kurti.jpg')">
Add to Cart
</button>
</div>

<div class="product">
<img src="shoes.jpg">
<h3>Sports Shoes</h3>
<p class="price">₹999</p>
<button onclick="addToCart('Sports Shoes', 999, 'shoes.jpg')">
Add to Cart
</button>
</div>

<div class="product">
<img src="watch.jpg">
<h3>Classic Watch</h3>
<p class="price">₹799</p>
<button onclick="addToCart('Classic Watch', 799, 'watch.jpg')">
Add to Cart
</button>
</div>

<div class="product">
<img src="bag.jpg">
<h3>Handbag</h3>
<p class="price">₹599</p>
<button onclick="addToCart('Handbag', 599, 'bag.jpg')">
Add to Cart
</button>
</div>

</div>

<script>
function addToCart(name, price, image) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existingProduct = cart.find(item => item.name === name);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({
            name: name,
            price: price,
            image: image,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart!");
}
</script>

</body>
</html>
