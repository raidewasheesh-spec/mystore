<!DOCTYPE html>
<html>
<head>
<title>MyStore - Fashion Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* Floating Buttons */
.floating-nav{
    position:fixed;
    top:15px;
    left:15px;
    z-index:999;
}
.floating-nav button{
    background:#222;
    color:white;
    border:none;
    padding:6px 10px;
    margin-right:5px;
    border-radius:5px;
    cursor:pointer;
}

/* Top Strip */
.top-strip{
    background:#ff3f6c;
    color:white;
    text-align:center;
    padding:8px;
    font-size:14px;
}

/* Header */
header{
    background:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.logo{
    font-size:24px;
    font-weight:bold;
    color:#ff3f6c;
}
nav a{
    margin-left:20px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* Slider */
.slider{
    width:100%;
    overflow:hidden;
    background:#fff;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:450px;
    object-fit:contain;
}

@keyframes slide{
    0%{margin-left:0;}
    30%{margin-left:0;}
    35%{margin-left:-100%;}
    65%{margin-left:-100%;}
    70%{margin-left:-200%;}
    100%{margin-left:-200%;}
}

/* Hero */
.hero{
    background:linear-gradient(to right,#ff3f6c,#ff9a9e);
    color:white;
    text-align:center;
    padding:60px 20px;
}
.hero h1{
    font-size:40px;
    margin:0;
}
.hero p{
    font-size:18px;
}
.hero button{
    margin-top:20px;
}

/* Products */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}
.product{
    background:white;
    width:230px;
    margin:15px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.product:hover{
    transform:translateY(-5px);
}
.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}
.price{
    color:#ff3f6c;
    font-weight:bold;
}
button{
    background:#ff3f6c;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    opacity:0.8;
}

/* Footer */
.footer{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="floating-nav">
<button onclick="history.back()">⬅ Back</button>
<button onclick="window.location.href='index.html'">🏠 Home</button>
</div>

<div class="top-strip">
🔥 Mega Fashion Sale | Free Delivery | Secure Payments
</div>

<header>
<div class="logo">MyStore</div>
<nav>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
<a href="cart.html">Cart</a>
</nav>
</header>

<!-- 🔥 AUTO SLIDING OFFER BANNER -->
<div class="slider">
  <div class="slides">
    <img src="offer1.jpg">
    <img src="offer2.jpg">
    <img src="offer3.jpg">
  </div>
</div>

<div class="hero">
<h1>Upgrade Your Style Today</h1>
<p>Trending Fashion at Unbeatable Prices</p>
<button onclick="document.getElementById('products').scrollIntoView()">
Shop Now
</button>
</div>

<h2 style="text-align:center;" id="products">Trending Products</h2>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>Casual T-Shirt</h3>
<p class="price">₹299</p>
<button onclick="addToCart('Casual T-Shirt',299,'tshirt.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="kurti.jpg">
<h3>Stylish Kurti</h3>
<p class="price">₹499</p>
<button onclick="addToCart('Stylish Kurti',499,'kurti.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="shoes.jpg">
<h3>Sports Shoes</h3>
<p class="price">₹999</p>
<button onclick="addToCart('Sports Shoes',999,'shoes.jpg')">Add to Cart</button>
</div>

<div class="product">
<img src="watch.jpg">
<h3>Classic Watch</h3>
<p class="price">₹799</p>
<button onclick="addToCart('Classic Watch',799,'watch.jpg')">Add to Cart</button>
</div>

</div>

<div class="footer">
© 2026 MyStore | About | Contact | Privacy Policy
</div>

<script>
function addToCart(name,price,image){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let existing=cart.find(item=>item.name===name);
if(existing){existing.quantity+=1;}
else{cart.push({name,price,image,quantity:1});}
localStorage.setItem("cart",JSON.stringify(cart));
alert(name+" added to cart!");
}
</script>

</body>
</html>
